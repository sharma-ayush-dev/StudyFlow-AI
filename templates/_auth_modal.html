<!-- AUTH MODAL — Shared across all pages -->
{% if not current_user.is_authenticated %}
<div id="authOverlay" class="auth-overlay hidden">
<div class="auth-modal">

    <button class="auth-close" id="closeAuthBtn">✕</button>

    <div id="loginPanel" class="auth-panel">
        <h2 class="auth-title">Welcome back</h2>
        <p class="auth-sub">Log in to your StudyFlow account</p>
        <div id="loginError" class="auth-error hidden"></div>

        <!-- Google Login Option -->
        <a href="{{ url_for('auth.google_login') }}" class="auth-google-btn">
            <svg viewBox="0 0 24 24" width="18" height="18" style="margin-right: 10px;">
                <path fill="#EA4335" d="M12 5c1.6 0 3 .6 4.1 1.7l3.1-3.1C17.3 1.8 14.8 1 12 1 7.3 1 3.4 3.7 1.5 7.7l3.9 3C6.3 7.8 8.9 5 12 5z"/>
                <path fill="#4285F4" d="M23.5 12.3c0-.8-.1-1.7-.2-2.3H12v4.6h6.5c-.3 1.5-1.1 2.8-2.4 3.7l3.7 2.9c2.2-2 3.7-5 3.7-8.9z"/>
                <path fill="#FBBC05" d="M5.4 14.7c-.3-.8-.4-1.7-.4-2.7s.1-1.9.4-2.7L1.5 6.3C.5 8.2 0 10.3 0 12.5s.5 4.3 1.5 6.2l3.9-3z"/>
                <path fill="#34A853" d="M12 23c3.2 0 6-1.1 8-3l-3.7-2.9c-1.1.7-2.5 1.2-4.3 1.2-3.1 0-5.7-2.8-6.6-5.7l-3.9 3C3.4 20.3 7.3 23 12 23z"/>
            </svg>
            Sign in with Google
        </a>

        <div class="auth-divider">
            <span>or sign in with</span>
        </div>

        <div class="auth-tabs">
            <button class="auth-tab-btn active" id="loginTabPassword">Password</button>
            <button class="auth-tab-btn" id="loginTabOTP">Email OTP</button>
        </div>

        <!-- Password login form fields -->
        <div id="passwordLoginForm">
            <label class="auth-label">Username or Email</label>
            <input id="loginIdentifier" class="auth-input" type="text"
                   placeholder="you@example.com" autocomplete="username">

            <label class="auth-label" style="margin-top: 10px; display: block;">Password</label>
            <input id="loginPassword" class="auth-input" type="password"
                   placeholder="••••••••" autocomplete="current-password">

            <label class="auth-remember" style="margin-top: 10px; display: flex;">
                <input type="checkbox" id="loginRemember"> Remember me for 7 days
            </label>

            <button class="auth-btn" id="loginSubmit" style="width: 100%; margin-top: 15px;">Log In</button>
        </div>

        <!-- OTP login form fields -->
        <div id="otpLoginForm" class="hidden">
            <label class="auth-label">Email Address</label>
            <div style="display: flex; gap: 10px; margin-top: 4px;">
                <input id="otpEmail" class="auth-input" type="email" placeholder="you@example.com" style="flex: 1;">
                <button type="button" id="sendOtpBtn" class="auth-btn" style="margin-top: 0; padding: 10px 15px; font-size: 13px; white-space: nowrap;">Send OTP</button>
            </div>

            <div id="otpVerifySection" class="hidden" style="margin-top: 15px;">
                <label class="auth-label" style="display: block; text-align: center; margin-bottom: 8px;">Enter 6-Digit OTP</label>
                <div class="otp-digits-container" id="loginOtpContainer">
                    <input class="otp-digit" type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" required />
                    <input class="otp-digit" type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" required />
                    <input class="otp-digit" type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" required />
                    <input class="otp-digit" type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" required />
                    <input class="otp-digit" type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" required />
                    <input class="otp-digit" type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" required />
                </div>
                <button type="button" id="verifyOtpSubmit" class="auth-btn" style="width: 100%; margin-top: 15px;">Verify & Log In</button>
            </div>
        </div>

        <p class="auth-switch">
            Don't have an account?
            <span class="auth-link" id="goToRegister">Create one</span>
        </p>
    </div>

    <div id="registerPanel" class="auth-panel hidden">
        <h2 class="auth-title">Create account</h2>
        <p class="auth-sub">Start planning smarter today</p>
        <div id="registerError" class="auth-error hidden"></div>

        <label class="auth-label">Full Name <span class="auth-hint">(required)</span></label>
        <input id="regFullName" class="auth-input" type="text"
               placeholder="John Doe" maxlength="50" required>

        <label class="auth-label">Username</label>
        <input id="regUsername" class="auth-input" type="text"
               placeholder="studymaster99" autocomplete="username">

        <label class="auth-label">Email</label>
        <input id="regEmail" class="auth-input" type="email"
               placeholder="you@example.com" autocomplete="email">

        <label class="auth-label">Password <span class="auth-hint">(min 8 chars)</span></label>
        <input id="regPassword" class="auth-input" type="password"
               placeholder="••••••••" autocomplete="new-password">

        <label class="auth-label">Confirm Password</label>
        <input id="regConfirm" class="auth-input" type="password"
               placeholder="••••••••" autocomplete="new-password">

        <label class="auth-label">
        Course <span class="auth-hint">(required, max 50 chars)</span>
        </label>
        <input id="regCourse"
            class="auth-input"
            type="text"
            placeholder="e.g. B.Tech Computer Science"
            maxlength="50"
            required>

        <button class="auth-btn" id="registerSubmit">Create Account</button>

        <p class="auth-switch">
            Already have an account?
            <span class="auth-link" id="goToLogin">Log in</span>
        </p>
    </div>

</div>
</div>
<script src="{{ url_for('static', filename='auth.js') }}"></script>
{% endif %}
