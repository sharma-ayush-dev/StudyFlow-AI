<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Accounts - Simulator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
    <style>
        .google-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            z-index: 10;
            position: relative;
        }
        .google-card {
            background: #ffffff;
            color: #202124;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .google-logo {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }
        .google-logo svg {
            width: 75px;
            height: 24px;
        }
        .google-title {
            font-size: 24px;
            font-weight: 400;
            text-align: center;
            margin-bottom: 8px;
            color: #202124;
        }
        .google-subtitle {
            font-size: 16px;
            text-align: center;
            margin-bottom: 30px;
            color: #5f6368;
        }
        .dev-badge {
            background: #e8f0fe;
            color: #1a73e8;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.4;
        }
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }
        .google-input {
            width: 100%;
            padding: 16px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            color: #202124;
            background-color: #fff;
        }
        .google-input:focus {
            border-color: #1a73e8;
        }
        .preset-accounts {
            margin-top: 24px;
            border-top: 1px solid #e8eaed;
            padding-top: 16px;
        }
        .preset-title {
            font-size: 13px;
            font-weight: 500;
            color: #5f6368;
            margin-bottom: 12px;
        }
        .preset-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 10px 12px;
            background: none;
            border: 1px solid transparent;
            border-radius: 4px;
            text-align: left;
            cursor: pointer;
            transition: background 0.15s;
        }
        .preset-btn:hover {
            background: #f8f9fa;
        }
        .avatar {
            width: 28px;
            height: 28px;
            background: #1a73e8;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            font-size: 14px;
        }
        .preset-info {
            display: flex;
            flex-direction: column;
        }
        .preset-name {
            font-size: 14px;
            font-weight: 500;
            color: #3c4043;
        }
        .preset-email {
            font-size: 12px;
            color: #5f6368;
        }
        .btn-google-submit {
            width: 100%;
            padding: 12px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-google-submit:hover {
            background: #1557b0;
        }
    </style>
</head>
<body style="background: #f0f2f5; color: #202124; margin:0; padding:0;">
    <div class="google-container">
        <div class="google-card">
            <div class="google-logo">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path fill="#EA4335" d="M12 5c1.6 0 3 .6 4.1 1.7l3.1-3.1C17.3 1.8 14.8 1 12 1 7.3 1 3.4 3.7 1.5 7.7l3.9 3C6.3 7.8 8.9 5 12 5z"/>
                    <path fill="#4285F4" d="M23.5 12.3c0-.8-.1-1.7-.2-2.3H12v4.6h6.5c-.3 1.5-1.1 2.8-2.4 3.7l3.7 2.9c2.2-2 3.7-5 3.7-8.9z"/>
                    <path fill="#FBBC05" d="M5.4 14.7c-.3-.8-.4-1.7-.4-2.7s.1-1.9.4-2.7L1.5 6.3C.5 8.2 0 10.3 0 12.5s.5 4.3 1.5 6.2l3.9-3z"/>
                    <path fill="#34A853" d="M12 23c3.2 0 6-1.1 8-3l-3.7-2.9c-1.1.7-2.5 1.2-4.3 1.2-3.1 0-5.7-2.8-6.6-5.7l-3.9 3C3.4 20.3 7.3 23 12 23z"/>
                </svg>
                <span style="font-weight: 500; font-size: 22px; margin-left: 8px; color: #5f6368; letter-spacing: -0.5px;">Google</span>
            </div>
            
            <h1 class="google-title">Sign in</h1>
            <p class="google-subtitle">to continue to StudyFlow-AI</p>
            
            <div class="dev-badge">
                🛠️ <strong>Developer Mode Simulator</strong><br>
                GOOGLE_CLIENT_ID not set. Simulating Google OAuth redirection callback.
            </div>

            <form action="/auth/google/callback" method="GET" style="display: flex; flex-direction: column; gap: 15px;">
                <div class="input-group">
                    <input class="google-input" type="email" name="email" id="emailInput" placeholder="Email or phone" value="mockuser@gmail.com" required>
                </div>
                
                <button type="submit" class="btn-google-submit">Next (Simulate Sign-In)</button>
            </form>

            <div class="preset-accounts">
                <div class="preset-title">Or choose a mock account:</div>
                
                <button class="preset-btn" onclick="selectPreset('john.doe@gmail.com')">
                    <div class="avatar" style="background: #34a853;">J</div>
                    <div class="preset-info">
                        <span class="preset-name">John Doe</span>
                        <span class="preset-email">john.doe@gmail.com</span>
                    </div>
                </button>

                <button class="preset-btn" onclick="selectPreset('ayush5161@gmail.com')" style="margin-top: 8px;">
                    <div class="avatar" style="background: #e91e63;">A</div>
                    <div class="preset-info">
                        <span class="preset-name">Ayush (Developer Preset)</span>
                        <span class="preset-email">ayush5161@gmail.com</span>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <script>
        function selectPreset(email) {
            document.getElementById('emailInput').value = email;
            document.querySelector('form').submit();
        }
    </script>
</body>
</html>
