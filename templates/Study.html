<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyFlow — Study: {{ topic }}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='Study.css') }}">
</head>
<body>

{% include '_navbar.html' %}

<div class="study-layout">

    <!-- ═══ LEFT SIDEBAR ═══ -->
    <aside class="study-sidebar">

        <div class="sidebar-subject">{{ subject }}</div>
        <h2 class="sidebar-topic">{{ topic }}</h2>

        {% if hours %}
        <div class="sidebar-pill">⏱ {{ hours }}h allocated today</div>
        {% endif %}

        {% if subtopics %}
        <div class="sidebar-section-title">Today's subtopics</div>
        <ul class="subtopic-list">
            {% for s in subtopics %}
            <li class="subtopic-item" id="sub-{{ loop.index0 }}">{{ s }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <div style="flex:1;"></div>

        <button class="quiz-btn" id="quizBtn">
            🎯 Quiz Me
        </button>

        <a href="{{ url_for('schedule_page') }}" class="back-link">
            ← Back to Schedule
        </a>

    </aside>


    <!-- ═══ CHAT PANEL ═══ -->
    <main class="chat-panel">

        <div class="chat-messages" id="chatMessages">
            <!-- messages rendered by Study.js -->
            <div class="chat-loading" id="chatLoading">
                <div class="loader-ring"></div>
                <p style="color:#777;margin-top:12px;font-size:14px;">Loading conversation…</p>
            </div>
        </div>

        <!-- TYPING INDICATOR -->
        <div class="typing-indicator hidden" id="typingIndicator">
            <span></span><span></span><span></span>
        </div>

        <!-- NOTICE BANNER (shows if fallback LLM was used) -->
        <div class="llm-notice hidden" id="llmNotice"></div>

        <!-- INPUT ROW -->
        <div class="chat-input-row">
            <textarea id="chatInput" class="chat-textarea"
                      placeholder="Ask a question or say 'I understand, continue'…"
                      rows="1"></textarea>
            <button class="send-btn" id="sendBtn">Send</button>
        </div>

    </main>

</div>

<script>
    window.CHAT_ID   = {{ chat_id   | tojson }};
    window.USER_ID   = {{ userid    | tojson }};
    window.SUBJECT   = {{ subject   | tojson }};
    window.TOPIC     = {{ topic     | tojson }};
    window.TODAY_STR = {{ today_str | tojson }};
</script>
<script src="{{ url_for('static', filename='Study.js') }}"></script>

</body>
</html>
