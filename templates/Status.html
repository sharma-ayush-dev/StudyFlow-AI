<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topics Status</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}?v={{ range(1, 10000) | random }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='studyflow-ux.css') }}?v={{ range(1, 10000) | random }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='Status.css') }}?v={{ range(1, 10000) | random }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Flatpickr for premium date picker -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>

<body>
    {% include '_ambient_bg.html' %}

    {% include '_navbar.html' %}

    <h1 class="page-title">Topics Status</h1>

    <!-- EDIT TOOLBAR — always rendered, always visible on load -->
    <div class="edit-toolbar" id="editToolbar">
        <button class="edit-toggle-btn" id="editToggleBtn">✏️ Edit Subjects &amp; Dates</button>
        <div class="edit-actions hidden" id="editActions">
            <button class="edit-save-btn" id="saveEditsBtn">✓ Save Changes</button>
            <button class="edit-cancel-btn" id="cancelEditsBtn">✕ Cancel</button>
        </div>
    </div>

    <div class="dashboard">

        <div class="topics-container-wrapper" id="topicsCard">
            <div style="text-align:center;padding:40px;color:#777;">Loading…</div>
        </div>

        <div class="card hours-card" style="display: flex; flex-direction: column; box-sizing: border-box;">
            <div class="hours-list" id="hoursList" style="flex: 1; overflow-y: auto; margin-bottom: 20px; padding-right: 4px;"></div>
            <div class="preferences-section" style="border-top: 1px solid rgba(255, 255, 255, 0.08); padding-top: 20px; flex-shrink: 0; display: flex; flex-direction: column; gap: 8px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="margin: 0; color: #fff; font-size: 16px; font-weight: 600;">Schedule Preference</h3>
                    <span id="statusPrefCounter" style="font-size: 11px; color: #777; font-weight: normal; font-family: 'Inter', sans-serif;">0 / {{ pref_limit }}</span>
                </div>
                <textarea id="statusPreferenceNote" maxlength="{{ pref_limit }}" placeholder="e.g. keep evenings lighter, revise hard topics first" style="width: 100%; height: 90px; background: #11111a; border: 1px solid #333; border-radius: 14px; padding: 12px 14px; color: white; font-size: 14px; outline: none; transition: all 0.2s ease; resize: none; box-sizing: border-box; font-family: 'Inter', sans-serif; line-height: 1.4;"></textarea>
            </div>
        </div>


    </div>

    <button id="generateBtn" class="generate-btn">Generate Schedule</button>

    <!-- MULTI-STAGE LOADING STATE -->
    <div id="statusLoader" class="sf-hidden"></div>

    <!-- ERROR CARD CONTAINER -->
    <div id="statusError" style="max-width:600px;margin:0 auto;padding:0 20px;"></div>

    <!-- CUSTOM CONFIRM MODAL -->
    <div id="confirmDiscardModal" class="confirm-modal-overlay hidden">
        <div class="confirm-modal-card">
            <h3 class="confirm-modal-title">Discard changes?</h3>
            <p class="confirm-modal-subtitle">All unsaved changes will be lost.</p>
            <div class="confirm-modal-actions">
                <button id="keepEditingBtn" class="confirm-modal-btn btn-keep">Keep Editing</button>
                <button id="discardChangesBtn" class="confirm-modal-btn btn-discard">Discard</button>
            </div>
        </div>
    </div>

    <script>
        window.INITIAL_DATA = {{ data | tojson | safe }};
    </script>
    <script src="{{ url_for('static', filename='studyflow-ux.js') }}?v={{ range(1, 10000) | random }}"></script>
    <script src="{{ url_for('static', filename='Status.js') }}?v={{ range(1, 1000) | random }}"></script>


    {% include '_footer.html' %}

</body>

</html>
