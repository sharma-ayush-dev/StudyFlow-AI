<nav class="main-nav">
    <a href="{{ url_for('landing') }}" class="logo">StudyFlow</a>

    {% if current_user.is_authenticated %}
    <div class="nav-links">
        <a href="{{ url_for('upload_page') }}"
           class="{{ 'nav-active' if request.endpoint == 'upload_page' else '' }}">
            Upload
        </a>
        <a href="{{ url_for('status_page') }}"
           class="{{ 'nav-active' if request.endpoint == 'status_page' else '' }}">
            Topics
        </a>
        <a href="{{ url_for('schedule_page') }}"
           class="{{ 'nav-active' if request.endpoint == 'schedule_page' else '' }}">
            Schedule
        </a>
        <a href="{{ url_for('progress_page') }}"
           class="{{ 'nav-active' if request.endpoint == 'progress_page' else '' }}">
            Progress
        </a>
    </div>
    <div class="nav-user">
        <span class="nav-username">{{ current_user.username }}</span>
        <div class="nav-profile-wrapper" id="navProfileWrapper">
            <button class="nav-profile-icon" id="navProfileBtn" title="Profile menu">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </button>
            <div class="profile-dropdown" id="profileDropdown">
                <a href="{{ url_for('settings_page') }}" class="profile-dropdown-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                    Account Settings
                </a>
                {% if current_user.is_admin %}
                <a href="{{ url_for('admin_dashboard') }}" class="profile-dropdown-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    </svg>
                    Admin Panel
                </a>
                {% endif %}
                <div class="profile-dropdown-divider"></div>
                <a href="{{ url_for('logout') }}" class="profile-dropdown-item profile-dropdown-logout">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    Logout
                </a>
            </div>
        </div>
    </div>
    {% else %}
    <div></div>
    <button class="btn-primary nav-login-btn" id="openAuthBtn"
            style="padding:9px 24px;font-size:14px;">
        Login
    </button>
    {% endif %}
</nav>

<script>
(function() {
    const btn = document.getElementById('navProfileBtn');
    const dropdown = document.getElementById('profileDropdown');
    if (!btn || !dropdown) return;

    btn.addEventListener('click', function(e) {
        e.stopPropagation();
        dropdown.classList.toggle('open');
    });

    document.addEventListener('click', function(e) {
        if (!dropdown.contains(e.target) && e.target !== btn) {
            dropdown.classList.remove('open');
        }
    });
})();
</script>
